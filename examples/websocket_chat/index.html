<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RustCFML WebSocket Chat</title>
<style>
  body { font: 15px/1.5 system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
  #log { border: 1px solid #ccc; border-radius: 8px; height: 320px; overflow-y: auto; padding: .75rem; margin: 1rem 0; }
  .sys { color: #888; font-style: italic; }
  .me { color: #0a7; }
  form { display: flex; gap: .5rem; }
  input { flex: 1; padding: .5rem; }
  button { padding: .5rem 1rem; }
</style>
</head>
<body>
  <h1>RustCFML WebSocket Chat</h1>
  <p class="sys">Open this page in two tabs and chat between them. Backed by
     <code>/websockets/chat.cfc</code> over a raw WebSocket.</p>
  <div id="log"></div>
  <form id="f">
    <input id="msg" placeholder="Say something…" autocomplete="off" />
    <button>Send</button>
  </form>

<script>
  const log = document.getElementById("log");
  function line(text, cls) {
    const d = document.createElement("div");
    if (cls) d.className = cls;
    d.textContent = text;
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
  }

  const proto = location.protocol === "https:" ? "wss" : "ws";
  const ws = new WebSocket(`${proto}://${location.host}/ws/chat`);
  let myId = null;

  ws.onopen = () => line("connected", "sys");
  ws.onclose = () => line("disconnected", "sys");
  ws.onmessage = (e) => {
    const frame = JSON.parse(e.data);
    switch (frame.ev) {
      case "welcome":
        myId = frame.d.id;
        line(`you are ${myId} — ${frame.d.online} online`, "sys");
        break;
      case "userJoined": line(`${frame.d.id} joined`, "sys"); break;
      case "userLeft":   line(`${frame.d.id} left`, "sys"); break;
      case "message":
        line(`${frame.d.from === myId ? "you" : frame.d.from}: ${frame.d.text}`,
             frame.d.from === myId ? "me" : null);
        break;
      case "ack": /* server confirmed delivery */ break;
    }
  };

  document.getElementById("f").addEventListener("submit", (e) => {
    e.preventDefault();
    const input = document.getElementById("msg");
    if (input.value && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ text: input.value }));
      input.value = "";
    }
  });
</script>
</body>
</html>
