name: Release Binaries

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macos-aarch64
            ext: ""
          - os: ubuntu-latest
            name: linux-x86_64
            ext: ""
          - os: ubuntu-24.04-arm
            name: linux-aarch64
            ext: ""
          - os: windows-latest
            name: windows-x86_64
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release -p rustcfml-cli

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: target/release/rustcfml${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Rename binaries
        run: |
          mkdir -p release
          for name in macos-aarch64 linux-x86_64 linux-aarch64; do
            cp "artifacts/${name}/rustcfml" "release/rustcfml-${name}"
            chmod +x "release/rustcfml-${name}"
          done
          cp "artifacts/windows-x86_64/rustcfml.exe" "release/rustcfml-windows-x86_64.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: release/*
